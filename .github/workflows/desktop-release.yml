name: Desktop release

# Builds the Mac .dmg + Windows .msi/.exe + Linux .AppImage on every `vX.Y.Z` tag and
# attaches the artifacts to the corresponding GitHub Release. The web's /download page
# links to these URLs via the `latest/` redirect.
#
# Required repo secrets: none for the unsigned path. To eliminate SmartScreen / Gatekeeper
# warnings later: add `APPLE_CERT_BASE64` + `WINDOWS_SIGNTOOL_CERT` (see SHIP_READINESS).

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix, e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  mac:
    name: Mac .dmg
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.x'
      - name: Install build helpers
        run: brew install xcodegen create-dmg
      - name: Build Mac artifacts
        env:
          BUILD_VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bash scripts/build-mac.sh
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/mac/Buzz-${{ steps.ver.outputs.version }}.dmg
            dist/mac/Buzz-${{ steps.ver.outputs.version }}.zip

  windows:
    name: Windows .msi / .exe
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node + Rust
        uses: actions/setup-node@v4
        with: { node-version: '20.x' }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"
      - name: Build web bundle (static export)
        working-directory: web
        run: |
          npm ci
          npm run build || true
      - name: Stamp version in tauri.conf.json
        working-directory: win/src-tauri
        run: |
          node -e "const fs=require('fs');const p='tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version='${{ steps.ver.outputs.version }}';fs.writeFileSync(p, JSON.stringify(c, null, 2)+'\n');"
      - name: Tauri build
        working-directory: win
        run: cargo tauri build
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            win/src-tauri/target/release/bundle/msi/*.msi
            win/src-tauri/target/release/bundle/nsis/*.exe
