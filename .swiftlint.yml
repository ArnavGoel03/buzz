included:
  - Buzz
  - BuzzTests

excluded:
  - Buzz.xcodeproj
  - .build
  - DerivedData

disabled_rules:
  - trailing_whitespace          # noisy in diffs; EditorConfig handles it on save
  - todo                         # TODOs are intentional scaffolding markers
  - multiple_closures_with_trailing_closure   # common in SwiftUI

opt_in_rules:
  - anyobject_protocol
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prohibited_super_call
  - redundant_nil_coalescing
  - single_test_class
  - sorted_first_last
  - toggle_bool
  - unused_import
  - vertical_parameter_alignment_on_call
  - yoda_condition

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

function_body_length:
  warning: 60
  error: 100

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 250
  error: 400

identifier_name:
  min_length:
    warning: 2
  excluded: [id, by, to, vm, t, x, y, dx, dy, a, b, c, m]

nesting:
  type_level: 2
