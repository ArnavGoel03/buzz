<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · Buzz</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0a0a0f; color: #fff; font-family: -apple-system, system-ui, sans-serif;
    }
    main { text-align: center; padding: 32px; max-width: 480px; }
    .accent { color: #FFD60A; font-size: 48px; }
    h1 { font-size: 28px; margin: 16px 0 8px; }
    p { color: rgba(255,255,255,0.7); }
    button { margin-top: 24px; padding: 12px 20px; background: #FFD60A; color: black;
             border: 0; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <div class="accent">✦</div>
    <h1>You're offline</h1>
    <p>Buzz works online. Once your connection is back, we'll pick up where you left off.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
